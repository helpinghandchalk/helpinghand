<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helping Hand</title>

  <style>
    :root {
      --bg: #E5E5DB;
      --text: #161616;
      --muted: rgba(22, 22, 22, 0.72);
      --faint: rgba(22, 22, 22, 0.54);
    }

    * {
      box-sizing: border-box;
      user-select: none;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 1fr minmax(360px, 760px) 1fr;
      grid-template-rows: auto 1fr auto;
      padding: 2.5rem 3.5rem;
    }

    .logo-wrap {
      grid-column: 2;
      justify-self: center;
    }

    .left-copy {
      grid-column: 1;
      align-self: center;
      margin-left: 2rem;
    }

    .right-copy {
      grid-column: 3;
      align-self: center;
      margin-right: 2rem;
    }

    .center-stage {
      grid-column: 2;
      display: grid;
      justify-items: center;
    }

    .product-stage {
      width: 560px;
      height: 620px;
      position: relative;
    }

    model-viewer {
      width: 980px;
      height: 820px;
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
    }

  </style>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body>

<main class="page">

  <div class="logo-wrap">
    <img src="logo.png" />
  </div>

  <div class="left-copy">
    <p>Chalk. CARE.</p>
    <p>From my hands to yours.</p>
    <p>~ Osh</p>
  </div>

  <div class="center-stage">
    <div class="product-stage">

      <model-viewer
        id="productViewer"
        src="product.glb"
        auto-rotate
        auto-rotate-delay="0"
        rotation-per-second="3deg"
        camera-controls
        touch-action="none"
        disable-zoom
        disable-pan
        environment-image="neutral"
        camera-target="0m 0m 0m"
        camera-orbit="-38deg 66deg 112%"
        min-camera-orbit="auto 20deg 112%"
        max-camera-orbit="auto 85deg 112%"
        field-of-view="16deg"
        scale="0.92 0.92 0.92"
      >
      </model-viewer>

    </div>
  </div>

  <div class="right-copy">
    osh@helpinghandchalk.co.uk
  </div>

</main>

<script>
const viewer = document.getElementById('productViewer');

const START_ORBIT = '-38deg 66deg 112%';
const START_TARGET = '0m 0m 0m';

let interacting = false;

/* ---------- RESET FUNCTION (FIXED) ---------- */
function resetToStart() {
  viewer.autoRotate = false;

  // force exact starting pose
  viewer.jumpCameraToGoal = true;
  viewer.cameraTarget = START_TARGET;
  viewer.cameraOrbit = START_ORBIT;

  // reset internal orbit rotation (THIS is what was missing before)
  if (viewer.resetTurntableRotation) {
    viewer.resetTurntableRotation(0);
  }

  requestAnimationFrame(() => {
    viewer.jumpCameraToGoal = false;
    viewer.autoRotate = true;
  });
}

/* ---------- LOAD ---------- */
viewer.addEventListener('load', () => {
  resetToStart();
});

/* ---------- INTERACTION ---------- */
viewer.addEventListener('pointerdown', () => {
  interacting = true;
  viewer.autoRotate = false;
});

/* ---------- RELEASE ---------- */
function endInteraction() {
  if (!interacting) return;
  interacting = false;
  resetToStart();
}

window.addEventListener('pointerup', endInteraction);
window.addEventListener('pointercancel', endInteraction);
window.addEventListener('touchend', endInteraction);
window.addEventListener('touchcancel', endInteraction);
viewer.addEventListener('mouseup', endInteraction);
viewer.addEventListener('mouseleave', endInteraction);

</script>

</body>
</html>
