<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    const isLocal =
      location.hostname === 'localhost' ||
      location.hostname === '127.0.0.1';

    if (!isLocal && location.protocol !== 'https:') {
      location.replace(
        'https://' +
        location.host +
        location.pathname +
        location.search +
        location.hash
      );
    }
  </script>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helping Hand</title>

  <style>
    :root {
      --bg: #E5E5DB;
      --text: #161616;
      --muted: rgba(22, 22, 22, 0.72);
      --faint: rgba(22, 22, 22, 0.54);
    }

    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    .overlay {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
    }

    .overlay-light {
      background:
        radial-gradient(circle at 50% 38%, rgba(255,255,255,0.06), transparent 42%),
        radial-gradient(circle at 50% 55%, rgba(0,0,0,0.035), transparent 72%);
      mix-blend-mode: soft-light;
    }

    .overlay-grain {
      opacity: 0.045;
      background-image:
        repeating-radial-gradient(circle at 0 0, transparent 0, rgba(0,0,0,0.2) 1px, transparent 2px),
        repeating-radial-gradient(circle at 100% 100%, transparent 0, rgba(255,255,255,0.15) 1px, transparent 2px);
      background-size: 180px 180px;
      mix-blend-mode: multiply;
    }

    .page {
      min-height: 100vh;
      display: grid;
      grid-template-columns: minmax(120px, 1fr) minmax(360px, 760px) minmax(120px, 1fr);
      grid-template-rows: auto 1fr auto;
      gap: 2rem;
      padding: 2.5rem 3.5rem 2rem;
    }

    .logo-wrap {
      grid-column: 2;
      justify-self: center;
    }

    .logo-wrap img {
      width: min(33vw, 500px);
      pointer-events: none;
    }

    .center-stage {
      grid-column: 2;
      display: grid;
      justify-items: center;
      align-content: center;
    }

    .product-stage {
      width: 560px;
      height: 620px;
      position: relative;
      pointer-events: none;
    }

    model-viewer {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -60%);
      width: 980px;
      height: 820px;
      pointer-events: auto;
      background: transparent;
    }
  </style>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>

<body>
  <div class="overlay overlay-light"></div>
  <div class="overlay overlay-grain"></div>

  <main class="page">
    <div class="logo-wrap">
      <img src="logo.png" alt="Helping Hand" draggable="false" />
    </div>

    <section class="center-stage">
      <div class="product-stage">
        <model-viewer
          id="productViewer"
          src="product.glb"
          auto-rotate
          auto-rotate-delay="0"
          rotation-per-second="3deg"
          camera-controls
          disable-zoom
          disable-pan
          interaction-prompt="none"
          touch-action="none"
          camera-target="0m 0m 0m"
          camera-orbit="-38deg 66deg 112%"
          interpolation-decay="400"
          style="--poster-color: transparent;"
        ></model-viewer>
      </div>
    </section>
  </main>

  <script>
    const viewer = document.getElementById('productViewer');

    const START_ORBIT = '-38deg 66deg 112%';
    const START_TARGET = '0m 0m 0m';
    const START_SCALE = '0.92 0.92 0.92';

    const RETURN_DURATION_MS = 480;

    let booted = false;
    let isPointerDown = false;
    let returnToken = 0;
    let resumeTimer = null;

    function clearResumeTimer() {
      if (resumeTimer) {
        clearTimeout(resumeTimer);
        resumeTimer = null;
      }
    }

    function stopRotation() {
      viewer.autoRotate = false;
      if (viewer.resetTurntableRotation) {
        viewer.resetTurntableRotation(0);
      }
    }

    function setStartInstant() {
      viewer.jumpCameraToGoal = true;
      viewer.cameraOrbit = START_ORBIT;
      viewer.cameraTarget = START_TARGET;
      viewer.scale = START_SCALE;
    }

    function setStartAnimated() {
      viewer.jumpCameraToGoal = false;
      viewer.cameraOrbit = START_ORBIT;
      viewer.cameraTarget = START_TARGET;
      viewer.scale = START_SCALE;
    }

    function startReturn() {
      const token = ++returnToken;

      clearResumeTimer();
      stopRotation();

      requestAnimationFrame(() => {
        if (token !== returnToken) return;

        setStartAnimated();

        resumeTimer = setTimeout(() => {
          if (token !== returnToken) return;
          if (isPointerDown) return;

          setStartInstant();

          requestAnimationFrame(() => {
            if (token !== returnToken) return;
            viewer.jumpCameraToGoal = false;
            viewer.autoRotate = true;
          });

        }, RETURN_DURATION_MS);
      });
    }

    function onPointerDown() {
      if (!booted) return;

      isPointerDown = true;
      returnToken++;
      clearResumeTimer();
      stopRotation();
    }

    function onPointerUp() {
      if (!booted || !isPointerDown) return;

      isPointerDown = false;
      startReturn();
    }

    viewer.addEventListener('load', () => {
      stopRotation();
      setStartInstant();

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          viewer.jumpCameraToGoal = false;
          viewer.autoRotate = true;
          booted = true;
        });
      });
    });

    viewer.addEventListener('pointerdown', onPointerDown, true);
    window.addEventListener('pointerup', onPointerUp, true);
    window.addEventListener('pointercancel', onPointerUp, true);
    window.addEventListener('blur', onPointerUp, true);
  </script>
</body>
</html>
