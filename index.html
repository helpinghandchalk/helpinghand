<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helping Hand</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #e9e8df;
      font-family: Arial, Helvetica, sans-serif;
    }

    .stage {
      width: 100vw;
      height: 100vh;
      display: grid;
      place-items: center;
    }

    model-viewer {
      width: 900px;
      height: 700px;
      background: transparent;
    }
  </style>
</head>

<body>

<div class="stage">
  <model-viewer
    id="productViewer"
    src="product.glb"
    poster="product-poster.png"
    auto-rotate
    auto-rotate-delay="0"
    rotation-per-second="3deg"
    camera-controls
    interaction-prompt="none"
    touch-action="none"
    disable-zoom
    disable-pan
    exposure="1"
    shadow-intensity="0"
    environment-image="neutral"
    environment-rotation="0deg 270deg 0deg"
    camera-target="0m 0m 0m"
    camera-orbit="-38deg 66deg 84%"
    field-of-view="16deg"
    interpolation-decay="110"
    style="--poster-color: transparent;"
  >
  </model-viewer>
</div>

<script>
const viewer = document.getElementById('productViewer');

const START_ORBIT = '-38deg 66deg 84%';
const START_TARGET = '0m 0m 0m';

let interacting = false;

/* ---------- INITIAL LOAD ---------- */
viewer.addEventListener('load', () => {
  viewer.autoRotate = false;

  viewer.jumpCameraToGoal = true;
  viewer.cameraTarget = START_TARGET;
  viewer.cameraOrbit = START_ORBIT;

  requestAnimationFrame(() => {
    viewer.jumpCameraToGoal = false;
    viewer.autoRotate = true;
  });
});

/* ---------- USER INTERACTION ---------- */
viewer.addEventListener('pointerdown', () => {
  interacting = true;
  viewer.autoRotate = false;
});

/* ---------- RESET IMMEDIATELY ON RELEASE ---------- */
function resetToStart() {
  if (!interacting) return;

  interacting = false;

  viewer.autoRotate = false;

  /* HARD SNAP BACK */
  viewer.jumpCameraToGoal = true;
  viewer.cameraTarget = START_TARGET;
  viewer.cameraOrbit = START_ORBIT;

  /* restart orbit from correct position */
  requestAnimationFrame(() => {
    viewer.jumpCameraToGoal = false;
    viewer.autoRotate = true;
  });
}

/* reliable release detection */
window.addEventListener('pointerup', resetToStart);
window.addEventListener('pointercancel', resetToStart);
window.addEventListener('touchend', resetToStart);
viewer.addEventListener('mouseup', resetToStart);
viewer.addEventListener('mouseleave', resetToStart);
</script>

</body>
</html>
